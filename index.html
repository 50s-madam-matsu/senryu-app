<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏の熟せん川柳大会 | 特設ページ</title>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Sans+JP:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #fdfaf2;
            --accent-color: #d4af37;
            --text-color: #4a4a4a;
            --zabuton-color: #e65b5b;
            --comment-bg: #f9f6f0;
            --logo-red: #b22222;
        }

        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: var(--primary-color);
            background-image: radial-gradient(#ffffff 20%, transparent 20%), radial-gradient(#ffffff 20%, transparent 20%);
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
            background-attachment: fixed;
            color: var(--text-color); margin: 0; padding: 0; line-height: 1.6; 
        }

        .container { max-width: 600px; margin: 0 auto; padding: 10px 20px 40px 20px; }
        header { text-align: center; margin-bottom: 20px; }
        
        .logo-area { text-align: center; margin: 0; }
        .main-logo { max-width: 100%; height: auto; display: inline-block; }

        .event-period {
            color: var(--accent-color);
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 0.1rem;
            margin-top: -5px;
            margin-bottom: 20px;
        }

        .sort-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .sort-btn {
            background: rgba(255, 255, 255, 0.8); border: 2px solid var(--accent-color); color: var(--accent-color);
            padding: 6px 18px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: all 0.2s;
        }
        .sort-btn.active { background: var(--accent-color); color: #fff; }

        .senryu-list { display: flex; flex-direction: column; gap: 30px; }
        .senryu-card { 
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-left: 6px solid var(--logo-red); position: relative; 
        }
        
        .senryu-content { 
            font-family: 'Shippori Mincho', serif; font-size: 1.6rem; writing-mode: vertical-rl; 
            text-orientation: upright; height: 240px; margin: 20px auto 0 auto; letter-spacing: 0.3rem; 
            line-height: 2.2; display: block; 
        }

        .senryu-author-name { text-align: right; font-size: 0.95rem; color: #666; margin-top: -30px; font-weight: 500; position: relative; z-index: 10; }
        .senryu-author-name::after { content: " 様"; }

        .staff-comment { 
            background-color: var(--comment-bg); border-radius: 10px; padding: 15px; 
            margin-top: 20px; font-size: 0.85rem; line-height: 1.6; color: #555; border: 1px solid #eee; 
            display: flex; gap: 12px; align-items: flex-start;
        }
        .staff-icon { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent-color); flex-shrink: 0; object-fit: cover; background: #eee; }
        .staff-text { flex-grow: 1; }
        .staff-name { font-weight: bold; color: var(--accent-color); display: block; margin-bottom: 3px; }

        .zabuton-area { display: flex; align-items: center; justify-content: center; margin-top: 25px; border-top: 1px dotted #eee; padding-top: 20px; }
        .zabuton-btn {
            background: var(--zabuton-color); color: white; border: none; padding: 10px 24px;
            border-radius: 30px; cursor: pointer; font-weight: bold; transition: all 0.2s; box-shadow: 0 4px 0 #b23a3a;
        }
        .zabuton-btn:hover { transform: scale(1.05); }
        .zabuton-btn:disabled { background: #ccc; box-shadow: none; cursor: default; }
        .count { font-size: 1.5rem; font-weight: bold; margin-left: 15px; color: var(--zabuton-color); min-width: 50px; }
        
        .zabuton-effect {
            position: fixed; pointer-events: none; font-size: 2rem; z-index: 9999;
            transition: transform 1s ease-out, opacity 1s ease-out;
        }

        footer { text-align: center; margin-top: 60px; padding-bottom: 40px; }
        footer a { color: var(--accent-color); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" onmousedown="return false;">

<div class="container">
    <header>
        <div class="logo-area">
            <img src="logo.png" alt="五十路マダム松山店 熟せん川柳 夏の陣" class="main-logo">
        </div>
        <div class="event-period">2026.06.01 - 08.31 限定開催</div>
        <p>お気に入りの句に座布団を！</p>
    </header>

    <div class="sort-controls">
        <button id="btn-new" class="sort-btn" onclick="sortSenryu('new', this)">新着順</button>
        <button id="btn-random" class="sort-btn active" onclick="sortSenryu('random', this)">ランダム</button>
    </div>

    <div class="senryu-list" id="senryuContainer">
        
        <div class="senryu-card" data-date="2024-05-12">
            <div class="senryu-content">指名して<br>夏を彩る<br>君の香</div>
            <div class="senryu-author-name">相模の龍</div>
            <div class="staff-comment">
                <img src="staff1.png" class="staff-icon" alt="アイコン">
                <div class="staff-text">
                    <span class="staff-name">かおる店長より：</span>
                    相模の龍様、いつも粋な一句ありがとうございます！情熱的な夏になりそうですね。
                </div>
            </div>
            <div class="zabuton-area">
                <button class="zabuton-btn" onclick="sendZabuton('senryu_01', this, event)">座布団をあげる</button>
                <span class="count" id="count_senryu_01">...</span>
            </div>
        </div>


        <div class="senryu-card" data-date="2024-05-12">
            <div class="senryu-content">熟女のね<br>笑顔は僕の<br>ビタミン剤</div>
            <div class="senryu-author-name">癒やしを求める戦士</div>
            <div class="staff-comment">
                <img src="staff1.png" class="staff-icon" alt="アイコン">
                <div class="staff-text">
                    <span class="staff-name">〇〇より：</span>
                    元気が出ると言ってもらえて嬉しいです！
                </div>
            </div>
            <div class="zabuton-area">
                <button class="zabuton-btn" onclick="sendZabuton('senryu_01', this, event)">座布団をあげる</button>
                <span class="count" id="count_senryu_01">...</span>
            </div>
        </div>

    </div>

    <footer>
        <a href="https://xn--vus92eq8nn9j.com/">← オフィシャルサイトへ戻る</a>
    </footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAdrKPQuXQSi822RCS6x48WBzmUj_B0VRo",
        authDomain: "senryu-app-8d069.firebaseapp.com",
        databaseURL: "https://senryu-app-8d069-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "senryu-app-8d069",
        storageBucket: "senryu-app-8d069.firebasestorage.app",
        messagingSenderId: "190660604196",
        appId: "1:190660604196:web:e97e7626f49a8be0d643b1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const today = new Date().toISOString().split('T')[0];

    function sortSenryu(type, btn) {
        const container = document.getElementById('senryuContainer');
        const cards = Array.from(container.getElementsByClassName('senryu-card'));
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (type === 'random') { cards.sort(() => Math.random() - 0.5); } 
        else { cards.sort((a, b) => new Date(b.dataset.date) - new Date(a.dataset.date)); }
        container.innerHTML = '';
        cards.forEach(card => container.appendChild(card));
        syncCounts();
    }

    function syncCounts() {
        const countElements = document.querySelectorAll('.count');
        countElements.forEach(el => {
            const id = el.id.replace('count_', '');
            database.ref('counts/' + id).off();
            database.ref('counts/' + id).on('value', (snapshot) => { el.innerText = snapshot.val() || 0; });
            const hasVoted = localStorage.getItem('voted_' + id + '_' + today);
            if (hasVoted) {
                const btn = el.previousElementSibling;
                btn.innerText = "本日は済み";
                btn.disabled = true;
            }
        });
    }

    function sendZabuton(id, btn, e) {
        const hasVoted = localStorage.getItem('voted_' + id + '_' + today);
        if (hasVoted) return;

        const effect = document.createElement('div');
        effect.className = 'zabuton-effect';
        effect.innerText = '🟫✨';
        effect.style.left = e.clientX + 'px';
        effect.style.top = e.clientY + 'px';
        document.body.appendChild(effect);
        setTimeout(() => {
            effect.style.transform = 'translateY(-150px) rotate(20deg)';
            effect.style.opacity = '0';
        }, 50);
        setTimeout(() => { effect.remove(); }, 1000);

        database.ref('counts/' + id).transaction((current) => (current || 0) + 1);
        localStorage.setItem('voted_' + id + '_' + today, "true");
        btn.innerText = "本日は済み";
        btn.disabled = true;
    }

    window.onload = function() {
        const randomBtn = document.getElementById('btn-random');
        sortSenryu('random', randomBtn);
    };
</script>

</body>
</html>

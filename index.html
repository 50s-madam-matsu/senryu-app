<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏の熟せん川柳大会 | 特設ページ</title>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Sans+JP:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #fcfaf5;
            --accent-color: #d4af37;
            --text-color: #4a4a4a;
            --zabuton-color: #e65b5b;
            --comment-bg: #f9f6f0;
        }

        body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--primary-color); color: var(--text-color); margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Shippori Mincho', serif; font-size: 2.2rem; color: var(--accent-color); margin: 10px 0; }
        
        .senryu-list { display: flex; flex-direction: column; gap: 30px; }
        .senryu-card { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border-left: 6px solid var(--accent-color); position: relative; }
        
        .senryu-content { 
            font-family: 'Shippori Mincho', serif; 
            font-size: 1.6rem; 
            writing-mode: vertical-rl; 
            text-orientation: upright; 
            height: 240px; 
            margin: 20px auto 0 auto; 
            letter-spacing: 0.3rem; 
            line-height: 2.2; 
            display: block; 
        }

        .senryu-author-name { 
            text-align: right; 
            font-size: 0.95rem; 
            color: #666; 
            margin-top: -30px; 
            font-weight: 500; 
            position: relative;
            z-index: 10;
        }
        .senryu-author-name::after { content: " 様"; }

        .staff-comment { 
            background-color: var(--comment-bg); 
            border-radius: 10px; 
            padding: 12px 15px; 
            margin-top: 20px; 
            font-size: 0.85rem; 
            line-height: 1.6; 
            color: #555; 
            border: 1px solid #eee; 
        }
        .staff-name { font-weight: bold; color: var(--accent-color); display: block; margin-bottom: 3px; }

        .zabuton-area { display: flex; align-items: center; justify-content: center; margin-top: 25px; border-top: 1px dotted #eee; padding-top: 20px; }
        .zabuton-btn {
            background: var(--zabuton-color); color: white; border: none; padding: 10px 24px;
            border-radius: 30px; cursor: pointer; font-weight: bold; transition: all 0.2s;
            box-shadow: 0 4px 0 #b23a3a;
        }
        .zabuton-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .zabuton-btn:active { transform: translateY(3px); box-shadow: none; }
        .zabuton-btn:disabled { background: #ccc; box-shadow: none; cursor: default; }
        .count { font-size: 1.5rem; font-weight: bold; margin-left: 15px; color: var(--zabuton-color); min-width: 50px; }
        
        footer { text-align: center; margin-top: 60px; padding-bottom: 40px; }
        footer a { color: var(--accent-color); text-decoration: none; font-size: 0.9rem; }

        .logo-area {
    text-align: center;
    margin: 20px 0;
}

.main-logo {
    max-width: 100%; 
    height: auto;
    display: inline-block;
}
    </style>
</head>
<body>

<div class="container">
   <header>
    <p style="letter-spacing: 0.2rem; color: #999;">＼ 五十路の夏企画！ ／</p>
    
    <div class="logo-area">
        <img src="logo.png" alt="五十路マダム松山店 熟せん川柳 夏の陣" class="main-logo">
    </div>
    
    <p>お気に入りの句に座布団を！</p>
</header>

    <div class="senryu-list">
        
        <div class="senryu-card">
            <div class="senryu-content">指名して<br>夏を彩る<br>君の香</div>
            <div class="senryu-author-name">相模の龍</div>
            <div class="staff-comment">
                <span class="staff-name">かおる店長より：</span>
                相模の龍様、いつも粋な一句ありがとうございます！情熱的な夏になりそうですね。
            </div>
            <div class="zabuton-area">
                <button class="zabuton-btn" onclick="sendZabuton('senryu_01', this)">座布団をあげる</button>
                <span class="count" id="count_senryu_01">...</span>
            </div>
        </div>

        <div class="senryu-card">
            <div class="senryu-content">熟女のね<br>笑顔は僕の<br>ビタミン剤</div>
            <div class="senryu-author-name">癒やしを求める戦士</div>
            <div class="staff-comment">
                <span class="staff-name">ななちゃんより：</span>
                元気が出ると言ってもらえて嬉しいです！座布団たくさんもらえるといいですね♪
            </div>
            <div class="zabuton-area">
                <button class="zabuton-btn" onclick="sendZabuton('senryu_02', this)">座布団をあげる</button>
                <span class="count" id="count_senryu_02">...</span>
            </div>
        </div>

    </div>

    <footer>
        <a href="index.html">← オフィシャルサイトへ戻る</a>
    </footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAdrKPQuXQSi822RCS6x48WBzmUj_B0VRo",
        authDomain: "senryu-app-8d069.firebaseapp.com",
        databaseURL: "https://senryu-app-8d069-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "senryu-app-8d069",
        storageBucket: "senryu-app-8d069.firebasestorage.app",
        messagingSenderId: "190660604196",
        appId: "1:190660604196:web:e97e7626f49a8be0d643b1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const today = new Date().toISOString().split('T')[0];

    function syncCounts() {
        const countElements = document.querySelectorAll('.count');
        countElements.forEach(el => {
            const id = el.id.replace('count_', '');
            
            database.ref('counts/' + id).on('value', (snapshot) => {
                el.innerText = snapshot.val() || 0;
            });

            const hasVoted = localStorage.getItem('voted_' + id + '_' + today);
            if (hasVoted) {
                const btn = el.previousElementSibling;
                btn.innerText = "本日は済み";
                btn.disabled = true;
            }
        });
    }

    function sendZabuton(id, btn) {
        const hasVoted = localStorage.getItem('voted_' + id + '_' + today);
        if (hasVoted) return;

        const countRef = database.ref('counts/' + id);
        countRef.transaction((current) => {
            return (current || 0) + 1;
        });

        localStorage.setItem('voted_' + id + '_' + today, "true");
        btn.innerText = "本日は済み";
        btn.disabled = true;
    }

    syncCounts();
</script>

</body>
</html>
